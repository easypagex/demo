<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=390, initial-scale=1.0" />
  <title>🇺🇸 Garvish Immigration Law Group</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:        #C8005A;
      --pink-dark:   #9B0044;
      --pink-deep:   #6B0030;
      --pink-light:  #E8006A;
      --gold:        #F5D98B;
      --gold-muted:  #C8A84B;
      --cream:       #FFF5F0;
      --white:       #FFFFFF;
    }

    html, body {
      width: 390px;
      height: 844px;
      overflow: hidden;
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: var(--pink);
    }

    .page {
      width: 390px;
      height: 844px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 36px;
      padding: 52px 28px 44px;
      position: relative;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 80% 10%, rgba(255,255,255,0.10) 0%, transparent 55%),
        radial-gradient(ellipse at 20% 90%, rgba(107,0,48,0.55) 0%, transparent 60%),
        linear-gradient(160deg, #E0005E 0%, #C8005A 40%, #8B003E 100%);
    }

    /* Decorative corner ornaments */
    .page::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 38px,
          rgba(255,255,255,0.035) 38px,
          rgba(255,255,255,0.035) 39px
        );
      pointer-events: none;
    }

    .seal {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 2px solid var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeDown 0.7s ease both;
      box-shadow: 0 0 18px rgba(245,217,139,0.25);
    }

    .seal svg { width: 30px; height: 30px; }

    /* ── HEADER ── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      animation: fadeDown 0.6s ease both;
    }

    .rule {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeDown 0.65s 0.05s ease both;
    }
    .rule span {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .rule em {
      font-style: italic;
      font-size: 10px;
      letter-spacing: 0.22em;
      color: var(--gold);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .main-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 900;
      font-size: 36px;
      line-height: 1.12;
      color: var(--white);
      text-align: center;
      letter-spacing: -0.01em;
      text-shadow: 0 2px 24px rgba(0,0,0,0.22);
      animation: fadeDown 0.7s 0.1s ease both;
    }

    .main-title em {
      display: block;
      font-style: italic;
      color: var(--gold);
    }

    /* ── BIG BUTTON ── */
    .btn-wrap {
      width: 100%;
      animation: riseUp 0.75s 0.2s ease both;
    }

    .cta-btn {
      display: block;
      width: 100%;
      padding: 26px 20px;
      background: var(--white);
      border: none;
      border-radius: 6px;
      text-decoration: none;
      text-align: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 8px 40px rgba(0,0,0,0.28),
        0 1px 0 rgba(255,255,255,0.5) inset,
        0 0 0 1.5px rgba(245,217,139,0.35);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .cta-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 55%);
      pointer-events: none;
    }

    .cta-btn:active {
      transform: scale(0.974);
      box-shadow: 0 4px 20px rgba(0,0,0,0.22);
    }

    .btn-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold-muted);
      margin-bottom: 5px;
    }

    .btn-name {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--pink-dark);
      line-height: 1.18;
      letter-spacing: -0.01em;
    }

    .btn-sub {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 13px;
      color: var(--pink);
      margin-top: 4px;
      opacity: 0.85;
    }

    .btn-arrow {
      display: inline-block;
      margin-top: 10px;
      font-size: 18px;
      color: var(--gold-muted);
    }

    /* ── SERVICES ── */
    .services {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
      border-top: 1px solid rgba(245,217,139,0.25);
      border-bottom: 1px solid rgba(245,217,139,0.25);
      animation: riseUp 0.8s 0.3s ease both;
    }

    .service-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 0;
      border-bottom: 1px solid rgba(255,255,255,0.10);
    }
    .service-item:last-child { border-bottom: none; }

    .service-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--gold);
      flex-shrink: 0;
      opacity: 0.85;
    }

    .service-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 12.5px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--cream);
    }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      animation: riseUp 0.85s 0.4s ease both;
    }
    .footer p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.06em;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes riseUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- Header -->
    <div class="header">
      <div class="seal">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="18" stroke="#F5D98B" stroke-width="1.2"/>
          <path d="M20 6 L21.8 14 L30 14 L23.6 18.8 L25.8 27 L20 22.4 L14.2 27 L16.4 18.8 L10 14 L18.2 14 Z" fill="#F5D98B" opacity="0.9"/>
        </svg>
      </div>

      <div class="rule">
        <span></span>
        <em>Est. Law Group</em>
        <span></span>
      </div>

      <h1 class="main-title">
        Your Trusted Guide<br>to the
        <em>American Dream®</em>
      </h1>
    </div>

    <!-- CTA Button -->
    <div class="btn-wrap">
      <a class="cta-btn" href="https://goimmigrationlaw.com/our-services/" target="_blank" rel="noopener">
        <div class="btn-label">Explore Our Services</div>
        <div class="btn-name">Garvish Immigration<br>Law Group, LLC</div>
        <div class="btn-sub">Attorneys at Law</div>
        <div class="btn-arrow">→</div>
      </a>
    </div>

    <!-- Footer -->
    <div class="footer">
      <p>Confidential Legal Services &nbsp;·&nbsp; goimmigrationlaw.com</p>
    </div>

  </div>
</body>
</html>
